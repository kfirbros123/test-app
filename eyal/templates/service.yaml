kind: Service     
apiVersion: v1     
metadata:
  name: {{ .Release.Name }}-service #from RELEASE NAME
spec:
  selector:
    {{- include "eyal.labels" . | nindent 4}}
  type: ClusterIP

  ports:         
  - name: http   
    protocol: TCP
    port: {{ .Values.port }} #from Values
    targetPort: {{ .Values.target_port }}  #from values